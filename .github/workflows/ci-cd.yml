# ============================================================
# CI/CD Pipeline — Azure AI Chat
# ============================================================
# Triggers: push a main, pull requests a main
#
# Secrets requeridos en GitHub (Settings → Secrets → Actions):
#   AZURE_USERNAME   – Usuario de Azure Container Registry (o service principal)
#   AZURE_PASSWORD   – Contraseña de Azure Container Registry (o SP secret)
#   ACR_LOGIN_SERVER – Servidor del ACR, p.ej. miacr.azurecr.io
#
# Variables opcionales (se pueden definir como secrets si se prefiere):
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT,
#   DATABASE_URL
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: chatazureopenai-backend

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. PRUEBAS UNITARIAS
  # ────────────────────────────────────────────────────────────
  test:
    name: Pruebas unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Ejecutar tests
        run: python -m pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────
  # 2. CONSTRUIR Y SUBIR IMAGEN A ACR
  # ────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push a ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_USERNAME }}
          password: ${{ secrets.AZURE_PASSWORD }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ────────────────────────────────────────────────────────────
  # 3. DESPLEGAR EN AZURE CONTAINER INSTANCES (ACI)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Desplegar en Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Login en Azure CLI
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_USERNAME }}",
              "clientSecret": "${{ secrets.AZURE_PASSWORD }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Desplegar contenedor en ACI
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          dns-name-label: chatazureopenai-unir
          image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          registry-login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.AZURE_USERNAME }}
          registry-password: ${{ secrets.AZURE_PASSWORD }}
          name: chatazureopenai-container
          location: westeurope
          ports: 8000
          environment-variables: |
            APP_NAME=Azure AI Chat
            DEBUG=false
          secure-environment-variables: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
            AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
            AZURE_OPENAI_DEPLOYMENT=${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
            AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}
