version: "3.9"

services:
  # ── Base de datos PostgreSQL ────────────────────────────────────────
  chatazure_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: Luised_0883
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Aplicación backend (FastAPI) ────────────────────────────────────
  chatazure_web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "7000:8000"
    depends_on:
      chatazure_db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Sobreescribe DATABASE_URL para apuntar al servicio 'db' local
      DATABASE_URL: postgresql://pgadmin:Luised_0883@db:5432/postgres?sslmode=disable

volumes:
  pgdata:
