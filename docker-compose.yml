version: "3.9"

services:
  # ── Base de datos PostgreSQL ────────────────────────────────────────
  chatazure_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgadmin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Aplicación backend (FastAPI) ────────────────────────────────────
  chatazure_web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "7000:8000"
    depends_on:
      chatazure_db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Sobreescribe DATABASE_URL para apuntar al servicio 'db' local
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@chatazure_db:5432/${POSTGRES_DB}?sslmode=disable

volumes:
  pgdata:
